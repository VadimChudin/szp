const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
let scrollPos = Math.max(0, DATA.candles.length - 14);
let visibleCount = 14;
let dragStartX = null;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight - 36;
  canvas.width = W;
  canvas.height = H;
  draw();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, W, H);

  const candles = DATA.candles;
  const n = candles.length;
  const step = DATA.step;
  const mx = DATA.mx;

  const s = Math.max(0, Math.min(scrollPos, n - visibleCount));
  const e = Math.min(s + visibleCount, n);
  const vis = candles.slice(s, e);
  if (!vis.length) return;

  // Ценовой диапазон видимых свечей
  let minP = Infinity, maxP = -Infinity;
  vis.forEach(c => {
    c.levels.forEach(l => {
      minP = Math.min(minP, l.p);
      maxP = Math.max(maxP, l.p);
    });
  });
  minP -= step * 2;
  maxP += step * 2;

  const chartH = H * 0.82;
  const deltaH = H * 0.15;
  const deltaY = chartH + H * 0.03;

  const cellW = (W - 80) / vis.length;  // ширина столбца свечи
  const halfW = cellW * 0.38;           // половина ячейки (buy/sell)
  const bodyW = cellW * 0.08;           // тело свечи
  const gapW = cellW * 0.02;
  const priceToY = (p) => chartH - ((p - minP) / (maxP - minP)) * chartH;
  const cellH = (step / (maxP - minP)) * chartH;

  const marginL = 5;

  // === Рисуем каждую свечу ===
  vis.forEach((candle, j) => {
    const xBase = marginL + j * cellW;
    const xBuyL = xBase + 2;                    // левый край buy
    const xMid = xBuyL + halfW;                 // граница buy|sell
    const xSellR = xMid + halfW;                // правый край sell
    const xBody = xSellR + gapW;                // тело свечи

    // Находим макс и мин уровень в этой свече
    let maxTotal = 0, maxPrice = null;
    let minTotal = Infinity, minPrice = null;
    candle.levels.forEach(l => {
      const t = l.b + l.s;
      if (t > maxTotal) { maxTotal = t; maxPrice = l.p; }
      if (t < minTotal && t > 0.3) { minTotal = t; minPrice = l.p; }
    });

    // Ячейки
    candle.levels.forEach(l => {
      const y = priceToY(l.p + step/2);
      const h = cellH;
      const buy = l.b, sell = l.s;

      const br = Math.min(1, Math.pow(buy / mx, 0.55));
      const sr = Math.min(1, Math.pow(sell / mx, 0.55));

      // Рамки ячеек
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(xBuyL, y, halfW, h);
      ctx.strokeRect(xMid, y, halfW, h);

      // Buy заполнение (от левого края вправо)
      if (br > 0.01) {
        const fw = halfW * br;
        const g = Math.floor(60 + br * 160);
        ctx.fillStyle = `rgba(20,${g},20,0.85)`;
        ctx.fillRect(xBuyL, y, fw, h);
      }

      // Sell заполнение (от правого края влево)
      if (sr > 0.01) {
        const fw = halfW * sr;
        const r = Math.floor(60 + sr * 160);
        ctx.fillStyle = `rgba(${r},20,20,0.85)`;
        ctx.fillRect(xSellR - fw, y, fw, h);
      }

      // 🟡 Жёлтая обводка — МАКС объём
      if (l.p === maxPrice && maxTotal > mx * 0.1) {
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 2.5;
        ctx.strokeRect(xBuyL - 1, y - 1, halfW * 2 + 2, h + 2);
        ctx.lineWidth = 0.5;
      }

      // 🔵 Синяя обводка — МИН объём
      if (l.p === minPrice && minPrice !== maxPrice && candle.levels.length > 2) {
        ctx.strokeStyle = '#3399ff';
        ctx.lineWidth = 2;
        ctx.strokeRect(xBuyL - 1, y - 1, halfW * 2 + 2, h + 2);
        ctx.lineWidth = 0.5;
      }

      // Числа
      const fontSize = Math.max(7, Math.min(11, cellH * 0.65));
      ctx.font = `${br > 0.3 ? 'bold ' : ''}${fontSize}px Courier New`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#000';
      const ty = y + h/2;

      if (buy >= mx * 0.02) {
        ctx.fillText(Math.round(buy), xBuyL + halfW/2, ty);
      }
      if (sell >= mx * 0.02) {
        ctx.font = `${sr > 0.3 ? 'bold ' : ''}${fontSize}px Courier New`;
        ctx.fillText(Math.round(sell), xMid + halfW/2, ty);
      }
    });

    // Тело свечи
    const bodyCol = candle.bull ? '#22aa55' : '#dd3333';
    const oY = priceToY(candle.o);
    const cY = priceToY(candle.c);
    const hY = priceToY(candle.h);
    const lY = priceToY(candle.l);

    // Фитиль
    ctx.strokeStyle = bodyCol;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.moveTo(xBody + bodyW/2, hY);
    ctx.lineTo(xBody + bodyW/2, lY);
    ctx.stroke();

    // Тело
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = bodyCol;
    ctx.fillRect(xBody, Math.min(oY, cY), bodyW, Math.max(2, Math.abs(cY - oY)));
    ctx.globalAlpha = 1.0;
  });

  // === Зоны ===
  (DATA.zones || []).forEach(z => {
    const zt = priceToY(z.top || z.price + 1);
    const zb = priceToY(z.bottom || z.price - 1);
    ctx.fillStyle = 'rgba(255,215,0,0.1)';
    ctx.fillRect(0, zt, W - 60, zb - zt);
    ctx.strokeStyle = 'rgba(200,160,0,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    const zy = priceToY(z.price);
    ctx.beginPath(); ctx.moveTo(0, zy); ctx.lineTo(W - 60, zy); ctx.stroke();
    ctx.setLineDash([]);
  });

  // === Ось Y (цены) ===
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(W - 60, 0, 60, chartH);
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W - 60, 0); ctx.lineTo(W - 60, chartH); ctx.stroke();

  const priceStep = step * Math.max(1, Math.floor(5 / (cellH / 15)));
  let p = Math.ceil(minP / priceStep) * priceStep;
  ctx.font = '10px Consolas';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'right';
  while (p <= maxP) {
    const y = priceToY(p);
    ctx.fillText(p.toFixed(2), W - 5, y + 3);
    ctx.strokeStyle = '#eee';
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W - 60, y); ctx.stroke();
    p += priceStep;
  }

  // === Дельта бар ===
  const maxD = Math.max(1, ...vis.map(c => Math.abs(c.d)));
  ctx.fillStyle = '#f8f8f8';
  ctx.fillRect(0, deltaY, W, deltaH);
  ctx.strokeStyle = '#ddd';
  ctx.beginPath(); ctx.moveTo(0, deltaY); ctx.lineTo(W, deltaY); ctx.stroke();

  const dMid = deltaY + deltaH / 2;
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(marginL, dMid); ctx.lineTo(W - 60, dMid); ctx.stroke();

  vis.forEach((c, j) => {
    const x = marginL + j * cellW + cellW * 0.15;
    const bw = cellW * 0.7;
    const bh = (Math.abs(c.d) / maxD) * (deltaH / 2 - 4);
    ctx.fillStyle = c.d >= 0 ? '#22aa55' : '#dd3333';
    if (c.d >= 0) {
      ctx.fillRect(x, dMid - bh, bw, bh);
    } else {
      ctx.fillRect(x, dMid, bw, bh);
    }
  });

  // === X-тики ===
  ctx.font = '9px Consolas';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'center';
  vis.forEach((c, j) => {
    const x = marginL + j * cellW + cellW/2;
    const t = c.t.split(' ');
    ctx.fillText(t.length > 1 ? t[1].slice(0,5) : t[0].slice(0,10),
                 x, deltaY + deltaH - 2);
  });

  // Info
  const last = candles[candles.length - 1];
  document.getElementById('info').textContent =
    `${s+1}–${e} of ${n} | Last: $${last.c.toFixed(2)} | Δ ${last.d > 0 ? '▲' : '▼'}${last.d.toFixed(1)}`;
}

// === Навигация ===
function scroll(d) {
  scrollPos = Math.max(0, Math.min(DATA.candles.length - visibleCount,
                                    scrollPos + d));
  draw();
}

function zoom(d) {
  visibleCount = Math.max(4, Math.min(40, visibleCount + d));
  scrollPos = Math.min(scrollPos, DATA.candles.length - visibleCount);
  draw();
}

function switchTF(tf) {
  // Reload page with different TF (handled by Python)
  document.querySelectorAll('.tf-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === tf.toUpperCase()));
}

// Mouse drag
canvas.addEventListener('mousedown', e => { dragStartX = e.clientX; });
canvas.addEventListener('mousemove', e => {
  if (dragStartX !== null) {
    const dx = e.clientX - dragStartX;
    const s = Math.round(dx / 40);
    if (s) { dragStartX = e.clientX; scroll(-s); }
  }
});
canvas.addEventListener('mouseup', () => { dragStartX = null; });
canvas.addEventListener('mouseleave', () => { dragStartX = null; });

// Wheel zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY > 0 ? 2 : -2);
}, {passive: false});

// Keys
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') scroll(-2);
  if (e.key === 'ArrowRight') scroll(2);
  if (e.key === '+' || e.key === '=') zoom(-2);
  if (e.key === '-') zoom(2);
  if (e.key === 'Home') { scrollPos = 0; draw(); }
  if (e.key === 'End') { scrollPos = DATA.candles.length - visibleCount; draw(); }
});

window.addEventListener('resize', resize);
resize();
</script>
</body>
